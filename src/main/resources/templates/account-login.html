<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Fiókom — Nemiskacat')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="wrap page-pad">
    <div class="head-row">
        <div>
            <div class="eyebrow">Üdv újra itt</div>
            <h1>Fiókom</h1>
        </div>
    </div>

    <div class="account-forms">
        <section class="auth-card">
            <h2 class="auth-card__title">Belépés</h2>
            <p class="notice bad" th:if="${param.hiba}">Hibás e-mail vagy jelszó.</p>
            <p class="notice ok" th:if="${param.regisztralt}">Sikeres regisztráció — most már beléphetsz.</p>
            <form th:action="@{/fiokom/belepes}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="field field--required">
                    <span>E-mail vagy felhasználónév</span>
                    <input type="text" name="email" required>
                </label>
                <label class="field field--required">
                    <span>Jelszó</span>
                    <input type="password" name="password" required>
                </label>
                <div class="auth-card__actions">
                    <button type="submit" class="btn btn-primary btn-block">Belépés</button>
                </div>
            </form>
        </section>

        <section class="auth-card">
            <h2 class="auth-card__title">Regisztráció</h2>
            <p class="notice bad" th:if="${registerError}" th:text="${registerError}">hiba</p>
            <form th:action="@{/fiokom/regisztracio}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="field">
                    <span>Vezetéknév</span>
                    <input type="text" name="lastName">
                </label>
                <label class="field">
                    <span>Keresztnév</span>
                    <input type="text" name="firstName">
                </label>
                <label class="field field--required">
                    <span>E-mail</span>
                    <input type="email" name="email" required>
                </label>
                <label class="field field--required">
                    <span>Jelszó (min. 8 karakter)</span>
                    <input type="password" name="password" required minlength="8">
                </label>
                <div class="auth-card__actions">
                    <button type="submit" class="btn btn-primary btn-block">Regisztráció</button>
                </div>
            </form>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: island-script}"></th:block>
</body>
</html>
