<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 0; overflow: hidden; border: none; background: transparent; }
  .stage {
    background: var(--nk-gray-20);
    padding: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 220px;
    border-radius: var(--nk-radius-md);
  }
  .stage img { max-width: 100%; height: auto; display: block; }
</style>
</head>
<body>
  <div class="card">
    <div class="stage">
      <img src="../assets/logos/nemiskacat-logo-black.png" alt="nemiskacat wordmark" style="max-width: 460px;" />
    </div>
  </div>
</body>
</html>
