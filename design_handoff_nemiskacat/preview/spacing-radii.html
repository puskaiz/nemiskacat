<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 0; overflow: hidden; border: none; background: transparent; }
  .stage {
    padding: 28px;
    background: var(--nk-gray-20);
    border-radius: var(--nk-radius-md);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 16px;
    align-items: end;
  }
  .swatch {
    background: var(--nk-white);
    height: 76px;
    box-shadow: var(--nk-shadow-md);
  }
  .swatch.r-sm { border-radius: 6px;  }
  .swatch.r-md { border-radius: 12px; }
  .swatch.r-lg { border-radius: 20px; }
  .swatch.r-xl { border-radius: 32px; }
  .lbl {
    font-family: var(--nk-font-serif);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--nk-fg-subtle);
    margin-top: 8px;
    text-align: center;
  }
  .px {
    font-family: var(--nk-font-mono);
    font-size: 11px;
    color: var(--nk-fg-muted);
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="stage">
      <div>
        <div class="swatch r-sm"></div>
        <div class="lbl">sm</div>
        <div class="px">6px</div>
      </div>
      <div>
        <div class="swatch r-md"></div>
        <div class="lbl">md · default</div>
        <div class="px">12px</div>
      </div>
      <div>
        <div class="swatch r-lg"></div>
        <div class="lbl">lg</div>
        <div class="px">20px</div>
      </div>
      <div>
        <div class="swatch r-xl"></div>
        <div class="lbl">xl</div>
        <div class="px">32px</div>
      </div>
    </div>
  </div>
</body>
</html>
