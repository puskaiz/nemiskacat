<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<style>
  .card { padding: 0; overflow: hidden; border: none; background: transparent; }
  .stage {
    background: var(--nk-gray-20);
    padding: 36px 28px 28px;
    border-radius: var(--nk-radius-md);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 20px;
  }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .swatch {
    width: 76px; height: 76px;
    background: var(--nk-white);
    border-radius: var(--nk-radius-md);
  }
  .s-xs { box-shadow: var(--nk-shadow-xs); }
  .s-sm { box-shadow: var(--nk-shadow-sm); }
  .s-md { box-shadow: var(--nk-shadow-md); }
  .s-lg { box-shadow: var(--nk-shadow-lg); }
  .lbl { font-family: var(--nk-font-serif); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--nk-fg-subtle); }
</style>
</head>
<body>
  <div class="card">
    <div class="stage">
      <div class="item"><div class="swatch s-xs"></div><div class="lbl">xs</div></div>
      <div class="item"><div class="swatch s-sm"></div><div class="lbl">sm · card</div></div>
      <div class="item"><div class="swatch s-md"></div><div class="lbl">md · menu</div></div>
      <div class="item"><div class="swatch s-lg"></div><div class="lbl">lg · modal</div></div>
    </div>
  </div>
</body>
</html>
